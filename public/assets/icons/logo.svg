<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240">
  <defs>
    <clipPath id="bg-clip">
      <rect x="0" y="0" width="480" height="240" rx="18"/>
    </clipPath>
    <radialGradient id="bg-grad" cx="70%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d6b52"/>
      <stop offset="100%" stop-color="#083d2e"/>
    </radialGradient>
    <radialGradient id="radar-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9FE1CB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9FE1CB" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="blip-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="480" height="240" rx="18" fill="url(#bg-grad)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#bg-clip)" opacity="0.06">
    <line x1="0" y1="60" x2="480" y2="60" stroke="#E1F5EE" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="480" y2="120" stroke="#E1F5EE" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="480" y2="180" stroke="#E1F5EE" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="240" stroke="#E1F5EE" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="240" stroke="#E1F5EE" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="240" stroke="#E1F5EE" stroke-width="0.5"/>
  </g>

  <!-- ─── RADAR (right side, centered at 340,120) ─── -->
  <g clip-path="url(#bg-clip)">
    <!-- Radar ambient glow -->
    <circle cx="340" cy="120" r="105" fill="url(#radar-glow)"/>

    <!-- Radar rings -->
    <circle cx="340" cy="120" r="100" fill="none" stroke="#5DCAA5" stroke-width="0.6" opacity="0.25"/>
    <circle cx="340" cy="120" r="75"  fill="none" stroke="#5DCAA5" stroke-width="0.7" opacity="0.35"/>
    <circle cx="340" cy="120" r="50"  fill="none" stroke="#5DCAA5" stroke-width="0.8" opacity="0.45"/>
    <circle cx="340" cy="120" r="25"  fill="none" stroke="#5DCAA5" stroke-width="1"   opacity="0.6"/>

    <!-- Crosshairs -->
    <line x1="240" y1="120" x2="440" y2="120" stroke="#9FE1CB" stroke-width="0.5" opacity="0.3"/>
    <line x1="340" y1="20"  x2="340" y2="220" stroke="#9FE1CB" stroke-width="0.5" opacity="0.3"/>

    <!-- Sweep wedge (270° to 30°) -->
    <path d="M340 120 L340 20 A100 100 0 0 1 426.6 170 Z" fill="url(#sweep-grad)"/>

    <!-- Sweep leading edge -->
    <line x1="340" y1="120" x2="426.6" y2="170" stroke="#9FE1CB" stroke-width="1.5" opacity="0.55"/>

    <!-- Stock tick waveform clipped inside radar -->
    <g clip-path="url(#bg-clip)">
      <polyline
        points="245,138 262,138 272,108 286,156 298,126 310,133 320,133 332,112 346,145 360,108 374,126 386,120 398,114 414,128 438,128"
        fill="none" stroke="#9FE1CB" stroke-width="1.8" opacity="0.8"
        stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Blip 1 (bright, with glow) -->
    <circle cx="409" cy="83" r="5" fill="#E1F5EE" opacity="0.95" filter="url(#blip-glow)"/>
    <circle cx="409" cy="83" r="10" fill="none" stroke="#9FE1CB" stroke-width="1" opacity="0.45"/>
    <circle cx="409" cy="83" r="16" fill="none" stroke="#9FE1CB" stroke-width="0.5" opacity="0.2"/>

    <!-- Blip 2 (smaller) -->
    <circle cx="370" cy="106" r="3.5" fill="#9FE1CB" opacity="0.85" filter="url(#blip-glow)"/>
    <circle cx="370" cy="106" r="7"   fill="none" stroke="#9FE1CB" stroke-width="0.7" opacity="0.3"/>

    <!-- Blip 3 (faint) -->
    <circle cx="390" cy="130" r="2.5" fill="#5DCAA5" opacity="0.6"/>

    <!-- Center dot -->
    <circle cx="340" cy="120" r="5.5" fill="#E1F5EE" opacity="0.95"/>
    <circle cx="340" cy="120" r="2.5" fill="#083d2e"/>
  </g>

  <!-- Divider line between text and radar -->
  <line x1="210" y1="30" x2="210" y2="210" stroke="#5DCAA5" stroke-width="0.5" opacity="0.3"/>

  <!-- ─── TEXT (left side) ─── -->
  <!-- TRADE -->
  <text
    x="28" y="108"
    font-family="'Courier New', Courier, monospace"
    font-size="52"
    font-weight="700"
    letter-spacing="4"
    fill="#E1F5EE"
    opacity="0.97">TRADE</text>

  <!-- RADAR (accent color) -->
  <text
    x="28" y="164"
    font-family="'Courier New', Courier, monospace"
    font-size="52"
    font-weight="700"
    letter-spacing="4"
    fill="#5DCAA5"
    opacity="0.95">RADAR</text>

  <!-- Tagline -->
  <text
    x="28" y="194"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    font-weight="400"
    letter-spacing="3.5"
    fill="#9FE1CB"
    opacity="0.55">STOCK SIGNAL TRACKER</text>

  <!-- Small decorative accent bar under TRADE -->
  <rect x="28" y="114" width="175" height="2" rx="1" fill="#5DCAA5" opacity="0.25"/>

  <!-- Border -->
  <rect x="0" y="0" width="480" height="240" rx="18" fill="none" stroke="#5DCAA5" stroke-width="1" opacity="0.3"/>
</svg>
